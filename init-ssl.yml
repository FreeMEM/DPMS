# Temporal - Solo para obtener certificado SSL inicial
# Uso:
#   docker compose -f init-ssl.yml up -d
#   docker compose -f init-ssl.yml run --rm certbot certonly \
#     --webroot --webroot-path=/var/www/certbot \
#     -d dpms.freemem.space -d api.dpms.freemem.space \
#     --email admin@freemem.space \
#     --agree-tos --non-interactive
#   docker compose -f init-ssl.yml down

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/init-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
