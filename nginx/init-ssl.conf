# Configuracion temporal para obtener certificado SSL
# Usar solo para el primer certbot, luego cambiar a production.yml

server {
    listen 80;
    server_name dpms.freemem.space;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'DPMS - Configuracion inicial - obteniendo certificado SSL';
        add_header Content-Type text/plain;
    }
}
