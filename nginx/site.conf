# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_login:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/s;

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name dpms.freemem.space;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name dpms.freemem.space;

    ssl_certificate /etc/letsencrypt/live/dpms.freemem.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dpms.freemem.space/privkey.pem;

    # SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 64M;

    # ============================================
    # BLOQUEOS DE SEGURIDAD
    # ============================================

    # Bloquear acceso a archivos ocultos
    location ~ /\. {
        deny all;
        return 403;
    }

    # ============================================
    # FRONTEND REACT (servido como build estatico)
    # ============================================

    location /app {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache para assets estaticos
        location ~* ^/app/static/.*\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend:80;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirigir raiz al frontend
    location = / {
        return 301 /app;
    }

    # ============================================
    # DJANGO API
    # ============================================

    # Login con rate limiting estricto
    location /users/login/ {
        limit_req zone=api_login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_party:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Signup con rate limiting estricto
    location /users/signup/ {
        limit_req zone=api_login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_party:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        limit_req zone=admin burst=20 nodelay;

        proxy_pass http://backend_party:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs
    location /docs/ {
        limit_req zone=admin burst=10 nodelay;

        proxy_pass http://backend_party:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API general (todas las demas rutas del backend)
    location / {
        limit_req zone=api_general burst=50 nodelay;

        proxy_pass http://backend_party:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static/ {
        proxy_pass http://backend_party:8000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django media files (uploads de producciones)
    location /media/ {
        proxy_pass http://backend_party:8000;
        expires 7d;
        add_header Cache-Control "public";

        # Bloquear ejecucion de scripts en uploads
        location ~* \.(py|sh|php|pl|cgi)$ {
            deny all;
            return 403;
        }
    }
}
