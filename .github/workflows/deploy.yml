name: Deploy to Production

on:
  push:
    branches:
      - main

# Cancel in-progress deploys when a new push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: true

defaults:
  run:
    working-directory: /var/www/DPMS

jobs:
  deploy:
    name: Deploy DPMS
    runs-on: self-hosted
    timeout-minutes: 15

    env:
      HOME: /root

    steps:
      - name: Detect changes
        id: changes
        run: |
          cd /var/www/DPMS

          # Resolve the target SHA from the remote before pulling.
          git -c safe.directory=/var/www/DPMS fetch origin main
          TARGET=$(git -c safe.directory=/var/www/DPMS rev-parse origin/main)
          echo "target=$TARGET" >> $GITHUB_OUTPUT

          # We can't use `git rev-parse HEAD` as the "previous" state: the
          # self-hosted runner lives on the same server as the repo, so pushes
          # made from this box leave local HEAD already aligned with
          # origin/main, turning the diff into a no-op. Track the last
          # successful deploy via a marker file instead (ignored by git).
          MARKER=/var/www/DPMS/.last-deployed-sha
          if [ -f "$MARKER" ]; then
            LAST_DEPLOYED=$(cat "$MARKER")
          else
            LAST_DEPLOYED=""
          fi

          if [ -z "$LAST_DEPLOYED" ]; then
            echo "No deploy marker found — forcing full restart."
            echo "need_backend_build=true" >> $GITHUB_OUTPUT
            echo "need_frontend_build=true" >> $GITHUB_OUTPUT
            echo "need_backend_restart=true" >> $GITHUB_OUTPUT
            echo "need_nginx_restart=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$LAST_DEPLOYED" = "$TARGET" ]; then
            echo "Already deployed $TARGET, nothing to do."
            echo "need_backend_build=false" >> $GITHUB_OUTPUT
            echo "need_frontend_build=false" >> $GITHUB_OUTPUT
            echo "need_backend_restart=false" >> $GITHUB_OUTPUT
            echo "need_nginx_restart=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git -c safe.directory=/var/www/DPMS diff --name-only "$LAST_DEPLOYED" "$TARGET")
          echo "Changed files (from $LAST_DEPLOYED to $TARGET):"
          echo "$CHANGED"

          # Detect what needs rebuild
          NEED_BACKEND_BUILD="false"
          NEED_FRONTEND_BUILD="false"
          NEED_BACKEND_RESTART="false"
          NEED_NGINX_RESTART="false"

          echo "$CHANGED" | grep -qE "^docker/backend/|^backend/requirements/" && NEED_BACKEND_BUILD="true"
          echo "$CHANGED" | grep -qE "^docker/frontend/|^frontend/package\.json|^frontend/yarn\.lock|^frontend/\.yarn" && NEED_FRONTEND_BUILD="true"
          echo "$CHANGED" | grep -qE "^backend/" && NEED_BACKEND_RESTART="true"
          echo "$CHANGED" | grep -qE "^frontend/src/" && NEED_FRONTEND_BUILD="true"
          echo "$CHANGED" | grep -qE "^nginx/" && NEED_NGINX_RESTART="true"

          echo "need_backend_build=$NEED_BACKEND_BUILD" >> $GITHUB_OUTPUT
          echo "need_frontend_build=$NEED_FRONTEND_BUILD" >> $GITHUB_OUTPUT
          echo "need_backend_restart=$NEED_BACKEND_RESTART" >> $GITHUB_OUTPUT
          echo "need_nginx_restart=$NEED_NGINX_RESTART" >> $GITHUB_OUTPUT

      - name: Pull latest code
        env:
          GIT_SSH_COMMAND: "ssh -i /root/.ssh/id_rsa -o StrictHostKeyChecking=no"
        run: |
          git -c safe.directory=/var/www/DPMS reset --hard origin/main

      - name: Rebuild backend image
        if: steps.changes.outputs.need_backend_build == 'true'
        run: docker compose -f production.yml build backend_party

      - name: Rebuild frontend image
        if: steps.changes.outputs.need_frontend_build == 'true'
        run: docker compose -f production.yml build frontend

      - name: Restart services
        run: |
          RESTARTED="false"

          if [ "${{ steps.changes.outputs.need_backend_build }}" = "true" ] || [ "${{ steps.changes.outputs.need_frontend_build }}" = "true" ]; then
            # Full `up -d` recrea los contenedores con imagen nueva.
            docker compose -f production.yml up -d
            RESTARTED="true"
          else
            # Sin rebuild, reiniciamos sólo lo que haya cambiado. Los servicios
            # son independientes (backend y nginx), así que ambos pueden
            # necesitar reinicio en el mismo deploy.
            if [ "${{ steps.changes.outputs.need_backend_restart }}" = "true" ]; then
              docker compose -f production.yml restart backend_party
              RESTARTED="true"
            fi
            if [ "${{ steps.changes.outputs.need_nginx_restart }}" = "true" ]; then
              # `restart` (no `reload`) porque el `git reset --hard` del paso
              # anterior reescribe site.conf con un inode nuevo; un bind mount
              # sigue apuntando al inode viejo hasta que el contenedor vuelve
              # a arrancar y Docker re-resuelve la ruta del host.
              docker compose -f production.yml restart nginx
              RESTARTED="true"
            fi
          fi

          if [ "$RESTARTED" = "false" ]; then
            echo "No restart needed"
          fi

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 15); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ || true)
            if [ "$HTTP_CODE" != "000" ]; then
              break
            fi
            sleep 2
          done

          RUNNING=$(docker compose -f production.yml ps --status running --format json | wc -l)
          TOTAL=$(docker compose -f production.yml ps --format json | wc -l)

          echo "Running: $RUNNING / Total: $TOTAL"

          if [ "$RUNNING" -lt "$TOTAL" ]; then
            echo "Some services failed to start:"
            docker compose -f production.yml ps
            exit 1
          fi

          if [ "$HTTP_CODE" = "000" ]; then
            echo "Nginx is not responding"
            docker compose -f production.yml logs nginx --tail 20
            exit 1
          fi

          echo "Deploy successful! (HTTP $HTTP_CODE)"

      - name: Update deploy marker
        run: |
          # Only mark as deployed after the health check passed so a failed
          # deploy replays next time instead of being silently skipped.
          echo "${{ steps.changes.outputs.target }}" > /var/www/DPMS/.last-deployed-sha

      - name: Cleanup old Docker images
        run: docker image prune -f
