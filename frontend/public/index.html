  <head>
    <meta charset="utf-8" />
    <meta name="description" content="Plataforma DPMS para Posadas Party" />

    <link rel="icon" href="/app/assets/favicon2025.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

  <body style="background-color: #121212;">

    <script>
      // Redirect to /app if accessing root
      if (window.location.pathname === '/') {
        window.location.replace('/app/');

    <div id="root">
      <div id="app-loader" style="display:flex;align-items:center;justify-content:center;height:100vh;background-color:#121212;">
        <div style="text-align:center;">
          <div style="width:40px;height:40px;border:3px solid #333;border-top-color:#FFA500;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;"></div>
          <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        </div>
      </div>
    </div>
